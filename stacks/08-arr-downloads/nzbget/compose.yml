services:
  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    restart: unless-stopped

    env_file:
      - ../../../.env

    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}

    volumes:
      - ${CONFIG_ROOT}/nzbget:/config
      - ${DOWNLOADS_ROOT}:/downloads

    # ----------------------------------------------------------------
    # VPN routing via the gluetun stack (08-arr-downloads/gluetun).
    # - Start gluetun FIRST; this won't start without it.
    # - This service's web UI is published on the GLUETUN stack, not here.
    # - To run WITHOUT the VPN: comment network_mode and add your own
    #   ports: + networks: (shared/proxy) instead.
    # - If gluetun is recreated, restart this container.
    # ----------------------------------------------------------------
    network_mode: "container:gluetun"

    # labels:
    #   - diun.enable=true   # opt in to Diun update notifications
