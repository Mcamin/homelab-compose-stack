services:
  dispatcharr:
    image: ghcr.io/dispatcharr/dispatcharr:latest
    container_name: dispatcharr
    restart: unless-stopped

    env_file:
      - ../../../.env

    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}

    volumes:
      - ${CONFIG_ROOT}/dispatcharr:/data

    # VPN routing via the gluetun stack (start gluetun first; UI port is
    # published on the gluetun stack; comment network_mode to skip the VPN;
    # restart this container if gluetun is recreated).
    network_mode: "container:gluetun"

    # labels:
    #   - diun.enable=true
