services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: libretranslate
    restart: unless-stopped
    env_file:
      - ../../../.env
    environment:
      TZ: ${TZ}
      LT_LOAD_ONLY: ${LT_LOAD_ONLY:-en,fr,de}
      LT_UPDATE_MODELS: "true"
    volumes:
      - ${DATA_ROOT}/libretranslate/data:/home/libretranslate/.local/share
      - ${DATA_ROOT}/libretranslate/cache:/home/libretranslate/.local/cache
    ports:
      - "${LIBRETRANSLATE_PORT:-5000}:5000"
    networks:
      - shared
      - proxy
    # ----------------------------
    # NVIDIA GPU (optional). Needs the nvidia-container-toolkit on the host.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    # ----------------------------
    # For GPU use the image: libretranslate/libretranslate:latest-cuda
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.libretranslate.rule=Host(`${LIBRETRANSLATE_DOMAIN}`)
    #   - traefik.http.routers.libretranslate.entrypoints=websecure
    #   - traefik.http.routers.libretranslate.tls=true
    #   - traefik.http.routers.libretranslate.tls.certresolver=${TRAEFIK_CERTRESOLVER}
    #   - traefik.http.services.libretranslate.loadbalancer.server.port=5000
    #
    #   - diun.enable=true
networks:
  shared:
    external: true
    name: ${SHARED_NETWORK}
  proxy:
    external: true
    name: ${PROXY_NETWORK}
