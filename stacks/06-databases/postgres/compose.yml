services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    env_file:
      - ../../../.env
    environment:
      TZ: ${TZ}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - ${DATA_ROOT}/postgres:/var/lib/postgresql/data
    # Expose on the host only if you need external access; otherwise other stacks
    # reach it over the shared/internal network by container name.
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - shared
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 5
networks:
  shared:
    external: true
    name: ${SHARED_NETWORK}
