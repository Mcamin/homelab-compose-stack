services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped

    env_file:
      - ../../../.env

    environment:
      TZ: ${TZ}

    volumes:
      - ${CONFIG_ROOT}/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro

    ports:
      - "${HOMEASSISTANT_PORT:-8123}:8123"

    networks:
      - shared
      - proxy

    # ----------------------------
    # Many integrations (mDNS discovery, HomeKit, Bluetooth, some Z-Wave/Zigbee)
    # require HOST networking. If you need those, replace the ports/networks above with:
    #   network_mode: host
    # and (for USB radios) add e.g.  devices: ["/dev/ttyUSB0:/dev/ttyUSB0"]  + privileged: true
    # ----------------------------

    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.homeassistant.rule=Host(`${HOMEASSISTANT_DOMAIN}`)
    #   - traefik.http.routers.homeassistant.entrypoints=websecure
    #   - traefik.http.routers.homeassistant.tls=true
    #   - traefik.http.routers.homeassistant.tls.certresolver=${TRAEFIK_CERTRESOLVER}
    #   - traefik.http.services.homeassistant.loadbalancer.server.port=8123
    #
    #   - diun.enable=true

networks:
  shared:
    external: true
    name: ${SHARED_NETWORK}
  proxy:
    external: true
    name: ${PROXY_NETWORK}
