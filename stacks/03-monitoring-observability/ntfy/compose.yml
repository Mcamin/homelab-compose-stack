services:
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    restart: unless-stopped
    user: "1000:1000"
    command:
      - serve

    env_file:
      - ../../../.env

    environment:
      TZ: ${TZ}
      # Public base URL (set this so links/attachments work)
      NTFY_BASE_URL: https://${NTFY_DOMAIN}

    volumes:
      - ${CONFIG_ROOT}/ntfy:/etc/ntfy
      - ${DATA_ROOT}/ntfy/cache:/var/cache/ntfy

    ports:
      - "${NTFY_PORT:-8082}:80"

    networks:
      - shared
      - proxy

    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s

    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.ntfy.rule=Host(`${NTFY_DOMAIN}`)
    #   - traefik.http.routers.ntfy.entrypoints=websecure
    #   - traefik.http.routers.ntfy.tls=true
    #   - traefik.http.routers.ntfy.tls.certresolver=${TRAEFIK_CERTRESOLVER}
    #   - traefik.http.services.ntfy.loadbalancer.server.port=80
    #
    #   - com.centurylinklabs.watchtower.enable=true

networks:
  shared:
    external: true
    name: ${SHARED_NETWORK}
  proxy:
    external: true
    name: ${PROXY_NETWORK}
