services:
  diun:
    image: crazymax/diun:latest
    container_name: diun
    restart: unless-stopped
    command: serve

    env_file:
      - ../../../.env

    environment:
      TZ: ${TZ}
      LOG_LEVEL: info
      DIUN_WATCH_SCHEDULE: ${DIUN_WATCH_SCHEDULE:-0 */6 * * *}
      DIUN_PROVIDERS_DOCKER: "true"
      # Only watch containers that opt in with the label diun.enable=true
      DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT: "false"
      # Optional ntfy notifications (leave endpoint empty to disable)
      DIUN_NOTIF_NTFY_ENDPOINT: ${DIUN_NTFY_ENDPOINT:-}
      DIUN_NOTIF_NTFY_TOPIC: ${DIUN_NTFY_TOPIC:-diun}

    volumes:
      - ${DATA_ROOT}/diun:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
