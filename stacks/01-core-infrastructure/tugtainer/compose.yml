services:
  tugtainer:
    image: ghcr.io/quenary/tugtainer:1
    container_name: tugtainer
    restart: unless-stopped

    env_file:
      - ../../../.env

    environment:
      TZ: ${TZ}
      AGENT_SECRET: ${TUGTAINER_AGENT_SECRET}

    volumes:
      - ${DATA_ROOT}/tugtainer:/tugtainer
      - /var/run/docker.sock:/var/run/docker.sock

    ports:
      - "${TUGTAINER_PORT:-9412}:80"

    networks:
      - shared
      - proxy

    labels:
      # Protect Tugtainer from updating itself (it manages the Docker socket).
      - dev.quenary.tugtainer.protected=true

    # labels (continued) — expose the UI via Traefik:
    #   - traefik.enable=true
    #   - traefik.http.routers.tugtainer.rule=Host(`${TUGTAINER_DOMAIN}`)
    #   - traefik.http.routers.tugtainer.entrypoints=websecure
    #   - traefik.http.routers.tugtainer.tls=true
    #   - traefik.http.routers.tugtainer.tls.certresolver=${TRAEFIK_CERTRESOLVER}
    #   - traefik.http.services.tugtainer.loadbalancer.server.port=80

networks:
  shared:
    external: true
    name: ${SHARED_NETWORK}
  proxy:
    external: true
    name: ${PROXY_NETWORK}
