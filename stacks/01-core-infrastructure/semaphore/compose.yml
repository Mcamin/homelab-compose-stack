services:
  semaphore:
    image: semaphoreui/semaphore:latest
    container_name: semaphore
    restart: unless-stopped
    env_file:
      - ../../../.env
    environment:
      TZ: ${TZ}
      # BoltDB = no external database (simplest). Use postgres/mysql for production.
      SEMAPHORE_DB_DIALECT: bolt
      SEMAPHORE_ADMIN: ${SEMAPHORE_ADMIN:-admin}
      SEMAPHORE_ADMIN_NAME: ${SEMAPHORE_ADMIN_NAME:-Admin}
      SEMAPHORE_ADMIN_EMAIL: ${SEMAPHORE_ADMIN_EMAIL:-admin@example.com}
      SEMAPHORE_ADMIN_PASSWORD: ${SEMAPHORE_ADMIN_PASSWORD}
      SEMAPHORE_ACCESS_KEY_ENCRYPTION: ${SEMAPHORE_ACCESS_KEY_ENCRYPTION}
      ANSIBLE_HOST_KEY_CHECKING: "false"
    volumes:
      - ${DATA_ROOT}/semaphore:/etc/semaphore
      - ${CONFIG_ROOT}/semaphore/playbooks:/playbooks
      - ${CONFIG_ROOT}/semaphore/inventory:/inventory:ro
    ports:
      - "${SEMAPHORE_PORT:-3000}:3000"
    networks:
      - shared
      - proxy
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.semaphore.rule=Host(`${SEMAPHORE_DOMAIN}`)
    #   - traefik.http.routers.semaphore.entrypoints=websecure
    #   - traefik.http.routers.semaphore.tls=true
    #   - traefik.http.routers.semaphore.tls.certresolver=${TRAEFIK_CERTRESOLVER}
    #   - traefik.http.services.semaphore.loadbalancer.server.port=3000
    #
    #   - diun.enable=true
networks:
  shared:
    external: true
    name: ${SHARED_NETWORK}
  proxy:
    external: true
    name: ${PROXY_NETWORK}
