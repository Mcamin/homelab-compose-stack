services:
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped

    env_file:
      - ../../../.env

    environment:
      TZ: ${TZ}

    volumes:
      - ${CONFIG_ROOT}/uptime-kuma:/app/data

    networks:
      - shared
      - proxy

    # labels:
    # ----------------------------
    # 🔀 Traefik (optional)
    # ----------------------------
    #   - traefik.enable=true
    #
    #   # Router
    #   - traefik.http.routers.uptime-kuma.rule=Host(`${UPTIME_KUMA_DOMAIN}`)
    #   - traefik.http.routers.uptime-kuma.entrypoints=websecure
    #   - traefik.http.routers.uptime-kuma.tls=true
    #
    #   # TLS cert resolver (e.g. letsencrypt)
    #   - traefik.http.routers.uptime-kuma.tls.certresolver=${TRAEFIK_CERTRESOLVER}
    #
    #   # Service (internal port)
    #   - traefik.http.services.uptime-kuma.loadbalancer.server.port=3001

    # ----------------------------
    # 🔄 Watchtower (optional auto-updates)
    # ----------------------------
    #   - com.centurylinklabs.watchtower.enable=true

    # ----------------------------
    # 🧪 Optional healthcheck
    # ----------------------------
    # healthcheck:
    #   test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3001/ || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 20s

networks:
  shared:
    external: true
    name: ${SHARED_NETWORK}
  proxy:
    external: true
    name: ${PROXY_NETWORK}