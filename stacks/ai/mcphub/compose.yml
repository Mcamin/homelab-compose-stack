services:
  mcphub:
    image: samanhappy/mcphub:latest
    container_name: mcphub
    restart: unless-stopped

    env_file:
      - ../../../.env

    environment:
      TZ: ${TZ}
      ADMIN_PASSWORD: ${MCPHUB_ADMIN_PASSWORD}
      JWT_SECRET: ${MCPHUB_JWT_SECRET}
    volumes:
      - ${CONFIG_ROOT}/mcphub/data:/app/data
      - ./mcp_settings.json:/app/mcp_settings.json:ro

    ports:
      - "${MCPHUB_PORT}:3000"

    networks:
      - shared
      - proxy

    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.mcphub.rule=Host(`${MCPHUB_DOMAIN}`)
    #   - traefik.http.routers.mcphub.entrypoints=websecure
    #   - traefik.http.routers.mcphub.tls=true
    #   - traefik.http.routers.mcphub.tls.certresolver=${TRAEFIK_CERTRESOLVER} # Must match Traefik config
    #   - traefik.http.services.mcphub.loadbalancer.server.port=3000
    #
    #   - com.centurylinklabs.watchtower.enable=true

    # healthcheck:
    #   test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/ || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 30s

networks:
  shared:
    external: true
    name: ${SHARED_NETWORK}
  proxy:
    external: true
    name: ${PROXY_NETWORK}